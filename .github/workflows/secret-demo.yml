name: Secret Demo

on:
  push:

jobs:
  check-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Check API Key
        env:
          HAS_SECRET: ${{ secrets.API_KEY != '' }}
        run: |
          if [ "$HAS_SECRET" = "true" ]; then
            echo "API_KEY configurado"
          else
            echo "API_KEY nao configurado"
          fi
